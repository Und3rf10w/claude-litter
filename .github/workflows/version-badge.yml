name: Update version badge

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Update README badge
        run: |
          sed -i "s|version-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*-|version-${{ steps.version.outputs.version }}-|" README.md

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet README.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: bump version badge to ${{ steps.version.outputs.version }}"
          git push
