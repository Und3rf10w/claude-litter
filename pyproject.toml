[project]
name = "litter-tui"
version = "0.1.0"
description = "A Textual TUI for managing Claude swarm teams"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "textual>=3.0",
    "claude-agent-sdk",
    "anyio",
    "watchfiles",
]

[project.scripts]
litter-tui = "litter_tui.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/litter_tui"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-anyio",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
